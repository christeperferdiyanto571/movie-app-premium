<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>ChrisFlix | Premium Movies</title>
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
      <div class="logo">
        <h2>Chris<span>Flix</span></h2>
      </div>
      <form id="form" class="search-form">
        <i class="fa fa-search search-icon"></i>
        <input type="text" id="search" class="search" placeholder="Search for movies, TV shows...">
      </form>
    </header>

    <!-- Hero / Featured Movie Section -->
    <section class="hero" id="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 id="hero-title">Loading...</h1>
        <div class="hero-meta" id="hero-meta">
          <span class="rating"><i class="fa-solid fa-star text-warning"></i> 0.0</span>
          <span class="year">...</span>
        </div>
        <p class="hero-overview" id="hero-overview">...</p>
        <div class="hero-buttons">
          <button class="btn btn-primary"><i class="fa-solid fa-play"></i> Watch Now</button>
          <button class="btn btn-secondary"><i class="fa-solid fa-info-circle"></i> More Info</button>
        </div>
      </div>
    </section>

    <!-- Movie Grid -->
    <section class="movie-container">
      <h2 class="section-title">Trending Now</h2>
      <main id="main" class="grid"></main>
    </section>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 ChrisFlix Entertainment. Designed for Portfolio.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
