<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>ChrisFlix | Premium Movies</title>
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar" id="navbar">
      <div class="logo">
        <h2>Chris<span>Flix</span></h2>
      </div>
      <form id="form" class="search-form">
        <i class="fa fa-search search-icon"></i>
        <input type="text" id="search" class="search" placeholder="Search for movies, TV shows...">
      </form>
    </header>

    <!-- Hero / Featured Movie Section -->
    <section class="hero" id="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 id="hero-title">Loading...</h1>
        <div class="hero-meta" id="hero-meta">
          <span class="rating"><i class="fa-solid fa-star text-warning"></i> 0.0</span>
          <span class="year">...</span>
        </div>
        <p class="hero-overview" id="hero-overview">...</p>
        <div class="hero-buttons">
          <button class="btn btn-primary"><i class="fa-solid fa-play"></i> Watch Now</button>
          <button class="btn btn-secondary"><i class="fa-solid fa-info-circle"></i> More Info</button>
        </div>
      </div>
    </section>

    <!-- Movie Rows -->
    <section class="movie-container" id="movie-container">
      <div class="movie-row-container" id="search-results-container" style="display:none;">
          <h2 class="section-title">Search Results</h2>
          <main id="search-results" class="row"></main>
      </div>
      
      <div class="movie-row-container" id="my-list-container" style="display:none;">
          <h2 class="section-title">My List</h2>
          <main id="my-list" class="row"></main>
      </div>

      <div class="movie-row-container">
          <h2 class="section-title">Trending Now</h2>
          <main id="trending" class="row"></main>
      </div>

      <div class="movie-row-container">
          <h2 class="section-title">Top Rated</h2>
          <main id="top-rated" class="row"></main>
      </div>

      <div class="movie-row-container">
          <h2 class="section-title">Action & Thrillers</h2>
          <main id="action" class="row"></main>
      </div>

      <div class="movie-row-container">
          <h2 class="section-title">Comedy Movies</h2>
          <main id="comedy" class="row"></main>
      </div>

      <div class="movie-row-container">
          <h2 class="section-title">Horror Movies</h2>
          <main id="horror" class="row"></main>
      </div>
    </section>

    <!-- Modal Details & Trailer -->
    <div id="movie-modal" class="modal-overlay">
      <div class="modal-content">
        <button id="close-modal" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
        <div class="modal-body">
          <div class="modal-video" id="modal-video">
            <!-- iframe YouTube inserted here -->
          </div>
          <div class="modal-info">
            <h2 id="modal-title" class="text-3xl font-bold">Movie Title</h2>
            <div class="modal-meta">
              <span id="modal-year" class="year">2026</span>
              <span id="modal-rating" class="rating"><i class="fa-solid fa-star text-warning"></i> 8.5</span>
              <span id="modal-runtime" class="runtime">120 min</span>
            </div>
            <div class="modal-genres" id="modal-genres"></div>
            <p id="modal-overview" class="overview-text">Overview text...</p>
            <h4 class="cast-title">Top Cast</h4>
            <div class="modal-cast" id="modal-cast">
              <!-- Cast images and names inserted here -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 ChrisFlix Entertainment. Designed for Portfolio.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
